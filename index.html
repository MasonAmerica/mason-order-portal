<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mason Device Order Portal</title>
  <meta name="description" content="Mason branded wrapper for the customer, ops, and RMA portals" />
  <meta name="theme-color" content="#6d28d9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="Mason Device Order Portal" />
  <meta property="og:description" content="Mason branded wrapper for the customer, ops, and RMA portals" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Mason" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Mason Device Order Portal" />
  <meta name="twitter:description" content="Mason branded wrapper for the customer, ops, and RMA portals" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root{
      --bg:#0b0b0f;
      --panel:#11131a;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.72);
      --border:rgba(255,255,255,0.08);
      --accent:#6d28d9;
      --accent-2:#7c3aed;
      --danger:#ef4444;
      --shadow:0 16px 50px rgba(0,0,0,0.35);
    }
    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(109,40,217,0.18), transparent 60%),
        radial-gradient(900px 500px at 85% 10%, rgba(124,58,237,0.14), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family:ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden;
    }
    body{ position:relative; }
    #portalFrame{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      background:#fff;
      display:block;
    }
    .overlay{
      position:fixed;
      inset:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(109,40,217,0.18), transparent 60%),
        radial-gradient(900px 500px at 85% 10%, rgba(124,58,237,0.14), transparent 55%),
        var(--bg);
      transition:opacity 300ms ease, visibility 300ms ease;
    }
    .overlay.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }
    .card{
      width:min(560px, 100%);
      border:1px solid var(--border);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow:var(--shadow);
      padding:28px 24px;
      text-align:center;
      backdrop-filter:blur(12px);
    }
    .logoWrap{
      display:flex;
      justify-content:center;
      margin-bottom:18px;
    }
    .logo{
      max-width:min(240px, 72vw);
      width:240px;
      height:auto;
      display:block;
      filter:invert(1) brightness(1.3);
    }
    h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.1;
      letter-spacing:-0.02em;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }
    .spinner{
      width:52px;
      height:52px;
      margin:24px auto 0;
      border-radius:50%;
      border:4px solid rgba(255,255,255,0.16);
      border-top-color:rgba(255,255,255,0.96);
      animation:spin 1s linear infinite;
    }
    .actions{
      margin-top:20px;
      display:flex;
      justify-content:center;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#fff;
      box-shadow:0 10px 24px rgba(109,40,217,0.28);
    }
    .error{
      border-color:rgba(239,68,68,0.35);
      background:linear-gradient(180deg, rgba(239,68,68,0.08), rgba(255,255,255,0.02));
    }
    .error h1{
      font-size:26px;
    }
    .small{
      margin-top:12px;
      font-size:13px;
      color:var(--muted);
      word-break:break-word;
    }
    @keyframes spin{
      to{ transform:rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce){
      .spinner{ animation:none; }
      .overlay{ transition:none; }
    }
  </style>
</head>
<body>
  <iframe id="portalFrame" title="Mason Device Order Portal"></iframe>

  <div id="loadingOverlay" class="overlay" aria-live="polite" aria-busy="true">
    <div class="card">
      <div class="logoWrap">
        <img
          class="logo"
          src="https://cdn.prod.website-files.com/66c49349d2b19d1734f5dcd5/66d18e61689cd30f9a3328fc_logo-dark.svg"
          alt="Mason"
        />
      </div>
      <h1 id="loadingTitle">Loading Mason Portal</h1>
      <p id="loadingMessage">Please wait while we securely connect you to the portal.</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div id="errorOverlay" class="overlay hidden" aria-live="assertive">
    <div class="card error">
      <div class="logoWrap">
        <img
          class="logo"
          src="https://cdn.prod.website-files.com/66c49349d2b19d1734f5dcd5/66d18e61689cd30f9a3328fc_logo-dark.svg"
          alt="Mason"
        />
      </div>
      <h1>Unable to open portal</h1>
      <p id="errorMessage">A valid portal parameter was not found in the URL.</p>
      <div class="actions">
        <button id="retryBtn" class="btn" type="button">Retry</button>
      </div>
      <div class="small" id="debugLine"></div>
    </div>
  </div>

  <script>
    // Replace this with your live Google Apps Script web app URL.
    const APPS_SCRIPT_BASE_URL = "https://script.google.com/macros/s/AKfycbxPMd-xeExz6CikGoxYDtFn8zvvB_prc61bcnQvV5kTNm1BSL0Q72FPUrww_R74Y-kb/exec";

    const iframe = document.getElementById("portalFrame");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const errorOverlay = document.getElementById("errorOverlay");
    const errorMessage = document.getElementById("errorMessage");
    const debugLine = document.getElementById("debugLine");
    const retryBtn = document.getElementById("retryBtn");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingMessage = document.getElementById("loadingMessage");

    function showLoading(mode) {
      const meta = getPortalMeta(mode);
      loadingTitle.textContent = meta.loadingTitle;
      loadingMessage.textContent = meta.loadingMessage;
      loadingOverlay.classList.remove("hidden");
      errorOverlay.classList.add("hidden");
    }

    function showError(message) {
      errorMessage.textContent = message || "Unable to open the portal.";
      debugLine.textContent = window.location.href;
      loadingOverlay.classList.add("hidden");
      errorOverlay.classList.remove("hidden");
    }

    function hideLoading() {
      loadingOverlay.classList.add("hidden");
      errorOverlay.classList.add("hidden");
    }

    function getPortalMeta(mode) {
      switch (mode) {
        case "ops":
          return {
            loadingTitle: "Loading Mason Operations Portal",
            loadingMessage: "Please wait while we securely connect you to the operations dashboard."
          };
        case "rma":
          return {
            loadingTitle: "Loading Mason RMA Portal",
            loadingMessage: "Please wait while we securely connect you to the RMA portal."
          };
        default:
          return {
            loadingTitle: "Loading Mason Order Portal",
            loadingMessage: "Please wait while we securely connect you to your customer portal."
          };
      }
    }

    function getRouteFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const token = (params.get("token") || "").trim();
      const portal = (params.get("portal") || "").trim().toLowerCase();

      if (token) {
        return { mode: "customer", token: token, portal: "" };
      }

      if (portal === "ops" || portal === "rma") {
        return { mode: portal, token: "", portal: portal };
      }

      throw new Error("Missing portal token or portal mode. Use ?token=... for customer links, ?portal=ops for ops, or ?portal=rma for RMA.");
    }

    function buildPortalUrl() {
      if (!APPS_SCRIPT_BASE_URL || APPS_SCRIPT_BASE_URL.includes("https://script.google.com/macros/s/AKfycbxPMd-xeExz6CikGoxYDtFn8zvvB_prc61bcnQvV5kTNm1BSL0Q72FPUrww_R74Y-kb/exec")) {
        throw new Error("Apps Script base URL is not configured in index.html yet.");
      }

      const route = getRouteFromUrl();
      const appUrl = new URL(APPS_SCRIPT_BASE_URL);

      if (route.mode === "customer") {
        appUrl.searchParams.set("token", route.token);
      } else {
        appUrl.searchParams.set("portal", route.portal);
      }

      return {
        mode: route.mode,
        url: appUrl.toString()
      };
    }

    function loadPortal() {
      try {
        const portal = buildPortalUrl();
        showLoading(portal.mode);
        iframe.src = portal.url;
      } catch (err) {
        showError(err && err.message ? err.message : "Unable to build the portal URL.");
      }
    }

    iframe.addEventListener("load", () => {
      hideLoading();
    });

    retryBtn.addEventListener("click", () => {
      iframe.src = "about:blank";
      loadPortal();
    });

    loadPortal();
  </script>
</body>
</html>
